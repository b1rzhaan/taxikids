name: kidstransfer
description: "KidsTransfer — детское такси (Parent + Driver)"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  dio: ^5.7.0
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  web_socket_channel: ^3.0.1
  intl: ^0.20.2
  url_launcher: ^6.3.0
  flutter_map_cancellable_tile_provider: ^3.0.2
  webview_flutter: ^4.10.0
  geolocator: ^13.0.2
  flutter_tts: ^4.2.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/car.png

# Run: flutter pub run flutter_launcher_icons
# Replace assets/logo.png with your own image, then re-run the command above.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  adaptive_icon_background: "#FFCE00"
  adaptive_icon_foreground: "assets/logo_fg.png"
